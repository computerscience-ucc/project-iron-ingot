name: Bug Report
description: Report a bug or unexpected behavior in UCC INGO
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug in UCC INGO. Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: page
    attributes:
      label: Affected Page
      description: Which page does this bug occur on?
      options:
        - Homepage (/)
        - Thesis (/thesis)
        - Blog (/blog)
        - Bulletin (/bulletin)
        - Awards (/awards)
        - Gallery (/gallery)
        - About (/about)
        - Council (/council)
        - Sanity Studio (/studio)
        - Chatbot
        - Other
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
