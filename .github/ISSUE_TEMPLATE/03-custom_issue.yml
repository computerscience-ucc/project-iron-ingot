name: Custom Issue
description: Create a custom issue for something not covered by other templates
title: "[Issue]: "
labels: ["needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Create a custom issue for UCC INGO. Please be as descriptive as possible.
  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: Describe your issue in detail.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references.
    validations:
      required: false
