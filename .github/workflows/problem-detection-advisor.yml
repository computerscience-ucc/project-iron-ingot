name: Problem Detection Advisor

on:
  workflow_run:
    workflows: ["Build and Check", "PR Validation"]
    types: [completed]

jobs:
  detect:
    name: Detect Problems
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Get workflow details
        uses: actions/github-script@v7
        id: details
        with:
          script: |
            const run = context.payload.workflow_run;
            return {
              name: run.name,
              url: run.html_url,
              branch: run.head_branch,
              commit: run.head_sha,
            };

      - name: Find related PR
        uses: actions/github-script@v7
        id: pr
        env:
          BRANCH: ${{ steps.details.outputs.branch }}
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: process.env.BRANCH,
            });
            return prs.data.length > 0 ? prs.data[0].number : null;

      - name: Create issue
        uses: actions/github-script@v7
        if: steps.pr.outputs.result == 'null'
        env:
          WORKFLOW_NAME: ${{ steps.details.outputs.name }}
          WORKFLOW_URL: ${{ steps.details.outputs.url }}
          WORKFLOW_BRANCH: ${{ steps.details.outputs.branch }}
          WORKFLOW_COMMIT: ${{ steps.details.outputs.commit }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI Failure: ${process.env.WORKFLOW_NAME}`,
              body: `## Workflow Failure\n\n**Workflow:** ${process.env.WORKFLOW_NAME}\n**Run:** ${process.env.WORKFLOW_URL}\n**Branch:** ${process.env.WORKFLOW_BRANCH}\n**Commit:** ${process.env.WORKFLOW_COMMIT}\n\nPlease investigate and fix the failure.`,
              labels: ['ci/cd', 'needs-triage'],
            });

      - name: Comment on PR
        uses: actions/github-script@v7
        if: steps.pr.outputs.result != 'null'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.result }}
          WORKFLOW_NAME: ${{ steps.details.outputs.name }}
          WORKFLOW_URL: ${{ steps.details.outputs.url }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER),
              body: `## Workflow Failure\n\n**Workflow:** ${process.env.WORKFLOW_NAME}\n**Run:** ${process.env.WORKFLOW_URL}\n\nPlease investigate and fix the failure.`,
            });
