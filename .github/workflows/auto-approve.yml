name: Auto Approve

on:
  check_suite:
    types: [completed]

jobs:
  auto-approve:
    name: Auto Approve
    runs-on: ubuntu-latest
    if: |
      github.event.check_suite.conclusion == 'success' &&
      !startsWith(github.event.check_suite.pull_requests[0].head.ref, 'main') &&
      !github.event.check_suite.pull_requests[0].draft &&
      github.event.check_suite.pull_requests[0].head.repo.owner.login == github.repository_owner
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.check_suite.pull_requests[0];
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
            });
