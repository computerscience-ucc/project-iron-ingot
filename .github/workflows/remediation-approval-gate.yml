name: Remediation Approval Gate

on:
  issue_comment:
    types: [created]

jobs:
  approve:
    name: Approve Remediation
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      github.event.comment.body == '/approve-remediation' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    permissions:
      actions: write
      pull-requests: write
    steps:
      - name: Get PR details
        uses: actions/github-script@v9
        id: pr
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              pull_number: context.issue.number,
            });
            return {
              sha: pr.data.head.sha,
              branch: pr.data.head.ref,
            };

      - name: Rerun failed workflows
        uses: actions/github-script@v9
        env:
          BRANCH: ${{ steps.pr.outputs.branch }}
        with:
          script: |
            const workflows = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: process.env.BRANCH,
              event: 'pull_request',
              status: 'failure',
            });

            for (const run of workflows.data.workflow_runs) {
              console.log(`Rerunning workflow: ${run.name} (${run.id})`);
              await github.rest.actions.retryWorkflow({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_run_id: run.id,
              });
            }

      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Remediation reruns approved and triggered. Failed workflows will be retried.',
            });
