name: Daily Health Check

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        continue-on-error: true

      - name: Create issue on failure
        uses: actions/github-script@v9
        if: failure()
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Health Check Failure`,
              body: `## Health Check Failure\n\n**Timestamp:** ${new Date().toISOString()}\n\nPlease investigate and resolve the issue.`,
              labels: ['monitoring', 'needs-triage'],
            });
